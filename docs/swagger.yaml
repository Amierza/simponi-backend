basePath: /api/v1
definitions:
  dto.CreateExternalProductRequest:
    properties:
      platform_id:
        type: string
      price:
        minimum: 0
        type: integer
      product_id:
        type: string
    required:
    - platform_id
    - price
    - product_id
    type: object
  dto.CreateProductRequest:
    properties:
      category_id:
        type: string
      description:
        example: A very nice hat
        type: string
      images:
        items:
          type: string
        type: array
      name:
        example: Refined Bronze Hat
        maxLength: 100
        minLength: 3
        type: string
      sku:
        example: L1L-448
        type: string
      stock:
        example: 100
        minimum: 0
        type: integer
    required:
    - name
    - sku
    - stock
    type: object
  dto.CreateRoleRequest:
    properties:
      name:
        type: string
      permission_ids:
        items:
          type: string
        type: array
    required:
    - name
    - permission_ids
    type: object
  dto.CreateStoreRequest:
    properties:
      description:
        type: string
      image_url:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      platform_id:
        type: string
    required:
    - name
    - platform_id
    type: object
  dto.CreateStoreUsersRequest:
    properties:
      user_ids:
        items:
          type: string
        type: array
    required:
    - user_ids
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      image_url:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        maxLength: 8
        minLength: 5
        type: string
      role_id:
        type: string
    required:
    - name
    - password
    type: object
  dto.CustomUserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
      message:
        example: failed request
        type: string
      status:
        example: false
        type: boolean
    type: object
  dto.ExternalProductCreateSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ExternalProductResponse'
      message:
        example: success create external product
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ExternalProductDeleteSuccessResponse:
    properties:
      message:
        example: success delete external product
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ExternalProductResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      image:
        type: string
      platform:
        type: string
      price:
        type: integer
      product_name:
        type: string
      store_platform_name:
        type: string
      updated_at:
        type: string
    type: object
  dto.ExternalProductSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ExternalProductResponse'
      message:
        example: success get external product
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ExternalProductUpdateSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ExternalProductResponse'
      message:
        example: success update external product
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ExternalProductsSuccessResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ExternalProductResponse'
        type: array
      message:
        example: success get external products
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ImpersonateResponse:
    properties:
      access_token:
        example: <new_access_token_here>
        type: string
    type: object
  dto.ImpersonateSuccessResponse:
    properties:
      data:
        $ref: '#/definitions/dto.ImpersonateResponse'
      message:
        example: success impersonate
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.PermissionPaginationResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.PermissionResponse'
        type: array
      message:
        example: success get permissions
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  dto.PermissionResponse:
    properties:
      endpoint:
        type: string
      id:
        type: string
      method:
        type: string
      module:
        type: string
      name:
        type: string
    type: object
  dto.PermissionResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.PermissionResponse'
        type: array
      message:
        example: success get permissions
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.PlatformResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.ProductCategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        example: Electronics
        type: string
    type: object
  dto.ProductEmptyResponseWrapper:
    properties:
      message:
        example: success
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ProductImageResponse:
    properties:
      id:
        type: string
      image_url:
        example: https://example.com/image.jpg
        type: string
    type: object
  dto.ProductListResponse:
    properties:
      category:
        $ref: '#/definitions/dto.ProductCategoryResponse'
      created_at:
        type: string
      external_products:
        items:
          $ref: '#/definitions/dto.ExternalProductResponse'
        type: array
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/dto.ProductImageResponse'
        type: array
      name:
        type: string
      sku:
        type: string
      status:
        description: '"Mapped", "Unmapped", "Low Stock", "Out of Stock"'
        type: string
      stock:
        type: integer
      store:
        $ref: '#/definitions/dto.ProductStoreResponse'
    type: object
  dto.ProductResponse:
    properties:
      category:
        $ref: '#/definitions/dto.ProductCategoryResponse'
      created_at:
        type: string
      description:
        type: string
      external_products:
        items:
          $ref: '#/definitions/dto.ExternalProductResponse'
        type: array
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/dto.ProductImageResponse'
        type: array
      name:
        example: Refined Bronze Hat
        type: string
      sku:
        example: L1L-448
        type: string
      stock:
        example: 100
        type: integer
      store:
        $ref: '#/definitions/dto.ProductStoreResponse'
      updated_at:
        type: string
    type: object
  dto.ProductResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.ProductResponse'
      message:
        example: success get product
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ProductStatsResponse:
    properties:
      low_stock:
        type: integer
      out_of_stock:
        type: integer
      stock_units:
        type: integer
      total_products:
        type: integer
      total_skus:
        type: integer
      unsynced:
        type: integer
    type: object
  dto.ProductStatsResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.ProductStatsResponse'
      message:
        example: success get product stats
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.ProductStoreResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.ProductsResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ProductListResponse'
        type: array
      message:
        example: success get products
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        example: <refresh_token_here>
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshTokenResponse:
    properties:
      access_token:
        example: <new_access_token_here>
        type: string
    required:
    - access_token
    type: object
  dto.RefreshTokenResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.RefreshTokenResponse'
      message:
        example: success refresh token
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.RoleEmptyResponseWrapper:
    properties:
      message:
        example: success delete role
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.RoleResponse:
    properties:
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/dto.PermissionResponse'
        type: array
    type: object
  dto.RoleResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.RoleResponse'
      message:
        example: success get role
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.RolesResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.RoleResponse'
        type: array
      message:
        example: success get roles
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  dto.SignInRequest:
    properties:
      email:
        example: admin@mail.com
        type: string
      password:
        example: secret123
        type: string
    required:
    - email
    - password
    type: object
  dto.SignInResponse:
    properties:
      access_token:
        example: <access_token_here>
        type: string
      refresh_token:
        example: <refresh_token_here>
        type: string
    type: object
  dto.SignInResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.SignInResponse'
      message:
        example: success signin
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.StoreEmptyResponseWrapper:
    properties:
      message:
        example: success delete store
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.StoreResponse:
    properties:
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      platforms:
        items:
          $ref: '#/definitions/dto.PlatformResponse'
        type: array
    type: object
  dto.StoreResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.StoreResponse'
      message:
        example: success get store
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.StoreUserEmptyResponseWrapper:
    properties:
      message:
        example: success delete store user
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.StoreUserResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.CustomUserResponse'
      message:
        example: success get store user
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.StoreUsersResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.CustomUserResponse'
        type: array
      message:
        example: success get store users
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  dto.StoresResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.StoreResponse'
        type: array
      message:
        example: success get stores
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  dto.UpdateExternalProductRequest:
    properties:
      price:
        minimum: 0
        type: integer
    required:
    - price
    type: object
  dto.UpdateProductRequest:
    properties:
      category_id:
        type: string
      description:
        example: A very nice hat
        type: string
      name:
        example: Refined Bronze Hat
        type: string
      sku:
        example: L1L-448
        type: string
      stock:
        example: 100
        type: integer
    type: object
  dto.UpdateRoleRequest:
    properties:
      name:
        type: string
      permission_ids:
        items:
          type: string
        type: array
    required:
    - name
    - permission_ids
    type: object
  dto.UpdateStockRequest:
    properties:
      change:
        example: -1
        type: integer
      note:
        example: 'Order #12345'
        type: string
      source:
        example: shopee
        type: string
    required:
    - change
    - source
    type: object
  dto.UpdateStoreRequest:
    properties:
      description:
        type: string
      image_url:
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        type: string
      image_url:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      role_id:
        type: string
    required:
    - name
    type: object
  dto.UpdateUserStatus:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  dto.UploadImageResponse:
    properties:
      image_url:
        type: string
    type: object
  dto.UploadSuccessMultipleResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UploadImageResponse'
        type: array
      message:
        example: success upload files
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.UserEmptyResponseWrapper:
    properties:
      message:
        example: success delete user
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      image_url:
        type: string
      name:
        type: string
      role:
        $ref: '#/definitions/dto.RoleResponse'
      status:
        type: string
    type: object
  dto.UserResponseWrapper:
    properties:
      data:
        $ref: '#/definitions/dto.UserResponse'
      message:
        example: success get user
        type: string
      status:
        example: true
        type: boolean
    type: object
  dto.UsersResponseWrapper:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      message:
        example: success get users
        type: string
      meta: {}
      status:
        example: true
        type: boolean
    type: object
  response.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta: {}
      status:
        type: boolean
    type: object
externalDocs:
  description: OpenAPI Specification
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@simponi.app
    name: Simponi Support
  description: |-
    REST API for Simponi - multi-store inventory and omnichannel management system.
    This API supports store management, product management, external product integration, vendor management, and role-based access control (RBAC).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://simponi.app/terms/
  title: Simponi Backend API
  version: "1.0"
paths:
  /auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Generate new access token using valid refresh token (no Bearer
        token required)
      parameters:
      - description: Refresh token request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/dto.RefreshTokenResponseWrapper'
        "400":
          description: Bad Request - Invalid payload
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - Invalid refresh token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Authenticate user using email and password to obtain access token
        and refresh token
      parameters:
      - description: Sign in request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/dto.SignInResponseWrapper'
        "400":
          description: Bad Request - Invalid payload
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized - Invalid credentials
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Sign in user
      tags:
      - Auth
  /impersonate/{user_id}:
    post:
      consumes:
      - application/json
      description: Admin impersonates another user and receives a new access token
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ImpersonateSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start impersonation
      tags:
      - Impersonate
  /impersonate/stop:
    post:
      consumes:
      - application/json
      description: Stop impersonation and return to original admin user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ImpersonateSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop impersonation
      tags:
      - Impersonate
  /permissions:
    get:
      consumes:
      - application/json
      description: |-
        Get all permissions or paginated permissions (Requires permission: GetPermissions)
        Set query param `pagination=false` to disable pagination
      parameters:
      - description: 'Enable pagination (true/false), default: true'
        in: query
        name: pagination
        type: string
      - description: Page number (if pagination=true)
        in: query
        name: page
        type: integer
      - description: Items per page (if pagination=true)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success (without pagination)
          schema:
            $ref: '#/definitions/dto.PermissionResponseWrapper'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get list of permissions
      tags:
      - Permissions
  /roles:
    get:
      consumes:
      - application/json
      description: 'Get paginated roles (Requires permission: GetRoles)'
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/dto.RolesResponseWrapper'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get list of roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      description: 'Create a new role with permissions (Requires permission: CreateRole)'
      parameters:
      - description: Create role request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            $ref: '#/definitions/dto.RoleResponseWrapper'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict - Role already exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new role
      tags:
      - Roles
  /roles/{role_id}:
    delete:
      consumes:
      - application/json
      description: 'Delete role by ID (Requires permission: DeleteRoleByRoleID)'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/dto.RoleEmptyResponseWrapper'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Role not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete role
      tags:
      - Roles
    get:
      consumes:
      - application/json
      description: 'Get role detail with permissions (Requires permission: GetRoleByRoleID)'
      parameters:
      - description: Role ID (UUID)
        in: path
        name: role_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/dto.RoleResponseWrapper'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Role not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get role by ID
      tags:
      - Roles
    put:
